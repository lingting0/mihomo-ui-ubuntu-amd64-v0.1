<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订阅管理 - mihomo</title>
<!-- Load metacubexd theme CSS for consistent styling -->
<link rel="stylesheet" href="./_nuxt/entry.B_k74qUh.css" crossorigin>
<style>
  /* 扩展样式 — 复用 metacubexd DaisyUI CSS 变量 */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: inherit;
    background: var(--color-base-100, oklch(0.15 0.005 285));
    color: var(--color-base-content, oklch(0.9 0 0));
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; font-weight: 600; }

  .card {
    background: var(--color-base-200, oklch(0.18 0.005 285));
    border: 1px solid color-mix(in oklch, var(--color-base-content, oklch(0.9 0 0)) 8%, transparent);
    border-radius: 0.75rem;
    padding: 20px;
    margin-bottom: 14px;
  }
  .card h2 {
    font-size: 0.85rem; margin-bottom: 14px;
    color: color-mix(in oklch, var(--color-base-content, oklch(0.9 0 0)) 60%, transparent);
    text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600;
  }

  input[type="url"] {
    flex: 1; padding: 9px 14px;
    background: var(--color-base-100, oklch(0.15 0.005 285));
    border: 1px solid color-mix(in oklch, var(--color-base-content, oklch(0.9 0 0)) 10%, transparent);
    border-radius: 0.5rem; color: var(--color-base-content, oklch(0.9 0 0));
    font-size: 0.875rem; outline: none; transition: border-color 0.2s;
  }
  input[type="url"]:focus {
    border-color: color-mix(in oklch, var(--color-primary, oklch(0.6 0.2 250)) 40%, transparent);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary, oklch(0.6 0.2 250)) 10%, transparent);
  }
  .input-group { display: flex; gap: 8px; }

  button {
    padding: 9px 18px; border: none; border-radius: 0.5rem;
    font-size: 0.875rem; cursor: pointer; font-weight: 600;
    transition: all 0.2s; white-space: nowrap;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-primary { background: var(--color-primary, oklch(0.6 0.2 250)); color: var(--color-primary-content, #fff); }
  .btn-success { background: var(--color-success, oklch(0.6 0.2 150)); color: var(--color-success-content, #fff); }
  .btn-ghost { background: transparent; color: var(--color-base-content, oklch(0.9 0 0)); border: 1px solid color-mix(in oklch, var(--color-base-content, oklch(0.9 0 0)) 10%, transparent); }

  .status-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
  .status-label { opacity: 0.6; font-size: 0.85rem; }
  .status-value { font-weight: 600; font-size: 0.95rem; }

  .log-area {
    background: var(--color-base-100, oklch(0.15 0.005 285));
    border: 1px solid color-mix(in oklch, var(--color-base-content, oklch(0.9 0 0)) 8%, transparent);
    border-radius: 0.5rem; padding: 12px; max-height: 300px;
    overflow-y: auto; font-family: 'SF Mono','Cascadia Code','Consolas',monospace;
    font-size: 0.78rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
    opacity: 0.85;
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px; border-radius: 0.5rem; font-size: 0.875rem;
    animation: slideIn 0.3s ease; z-index: 1000; font-weight: 500;
  }
  .toast-success { background: var(--color-success, oklch(0.6 0.2 150)); color: var(--color-success-content, #fff); }
  .toast-error { background: var(--color-error, oklch(0.5 0.2 20)); color: var(--color-error-content, #fff); }
  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 4px;
    margin-bottom: 20px; color: color-mix(in oklch, var(--color-base-content, oklch(0.9 0 0)) 60%, transparent);
    text-decoration: none; font-size: 0.85rem; transition: color 0.2s;
  }
  .back-link:hover { color: var(--color-primary, oklch(0.6 0.2 250)); }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 匹配 metacubexd 的 animate-fade-slide-in */
  .animate-fade-slide-in {
    animation: fadeSlideIn 0.3s ease-out backwards;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <a href="./" class="back-link">← 返回面板</a>
  <h1>📡 订阅管理</h1>

  <div class="card animate-fade-slide-in" style="animation-delay:0ms">
    <h2>🔗 订阅地址</h2>
    <div class="input-group">
      <input type="url" id="subUrl" placeholder="输入订阅 URL (https://...)" />
      <button class="btn-primary" onclick="saveUrl()">保存</button>
    </div>
  </div>

  <div class="card animate-fade-slide-in" style="animation-delay:50ms">
    <h2>📊 状态</h2>
    <div class="status-row">
      <span class="status-label">代理节点数</span>
      <span class="status-value" id="nodeCount">--</span>
    </div>
    <div class="status-row">
      <span class="status-label">最后更新</span>
      <span class="status-value" id="lastUpdate">--</span>
    </div>
  </div>

  <div class="card animate-fade-slide-in" style="animation-delay:100ms">
    <h2>⚡ 操作</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn-success" id="updateBtn" onclick="triggerUpdate()">
        🔄 立即更新订阅
      </button>
    </div>
  </div>

  <div class="card animate-fade-slide-in" style="animation-delay:150ms">
    <h2>📋 日志</h2>
    <div class="log-area" id="logArea">加载中...</div>
  </div>
</div>

<script>
var API = window.location.protocol + '//' + window.location.hostname + ':9091';

async function api(path, opts) {
  opts = opts || {};
  var r = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  return r.json();
}

async function loadStatus() {
  try {
    var data = await api('/api/status');
    document.getElementById('subUrl').value = data.url || '';
    document.getElementById('nodeCount').textContent = data.node_count + ' 个';
    document.getElementById('lastUpdate').textContent = data.last_update || '暂无';
    document.getElementById('logArea').textContent =
      (data.log_entries && data.log_entries.length)
        ? data.log_entries.join('\n') : '暂无日志';
  } catch (e) {
    document.getElementById('logArea').textContent =
      '⚠️ 无法连接 API (端口 9091)\n请确认 sub-api 服务已启动。';
  }
}

async function saveUrl() {
  var url = document.getElementById('subUrl').value.trim();
  if (!url) { toast('请输入订阅 URL', 'error'); return; }
  try {
    var data = await api('/api/url', {
      method: 'POST',
      body: JSON.stringify({ url: url })
    });
    toast(data.message, data.success ? 'success' : 'error');
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
}

async function triggerUpdate() {
  var btn = document.getElementById('updateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 更新中...';
  try {
    var data = await api('/api/update', { method: 'POST' });
    toast(
      data.success ? '✅ 更新完成！节点数: ' + data.node_count : '❌ 更新失败',
      data.success ? 'success' : 'error'
    );
    await loadStatus();
  } catch (e) {
    toast('请求失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔄 立即更新订阅';
  }
}

function toast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

loadStatus();
</script>
</body>
</html>
